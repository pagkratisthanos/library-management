spring:
  application:
    name: library-management

  datasource:
    url: jdbc:postgresql://localhost:5432/library_db
    username: postgres
    password: postgres
    driver-class-name: org.postgresql.Driver

  jpa:
    hibernate:
      ddl-auto: validate
    show-sql: true
    properties:
      hibernate:
        format_sql: true
        dialect: org.hibernate.dialect.PostgreSQLDialect

  flyway:
    enabled: true
    locations: classpath:db/migration

server:
  port: 8080


app:
  security:
    secret-key: ${APP_SECURITY_SECRET_KEY}
    jwt-expiration: ${APP_SECURITY_JWT_EXPIRATION:43200000}
logging:
  level:
    org.springframework.security: DEBUG
    com.library.management: DEBUG

springdoc:
  swagger-ui:
    persist-authorization: true